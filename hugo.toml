baseURL = "https://salatof.site"
languageCode = "zh-cn"
title = "学习基地"
theme = "PaperMod"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false

[pagination]
  paginate = 8

[minify]
  disableXML = true
  minifyOutput = true

[params]
  env = "production"
  title = "fgyblog"
  description = "记录技术探索与学习过程中的思考与收获"
  keywords = ["学习笔记", "博客", "技术"]
  author = "Blog"
  DateFormat = "2006年1月2日"
  defaultTheme = "dark"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = false
  ShowWordCount = true
  ShowRssButtonInSectionTermList = false
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.homeInfoParams]
    Title = "Welcome 欢迎"
    Content = """
这里记录着技术探索与学习的思考与收获。\n
每一篇文章都是知识积累的一部分。
"""

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/AirDryingFish"

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  [params.label]
    text = "fgyblog"
    iconHeight = 35

[taxonomies]
  tag = "tags"
  category = "categories"

[[menu.main]]
  identifier = "posts"
  name = "文章"
  url = "/posts/"
  weight = 10

[[menu.main]]
  identifier = "archives"
  name = "归档"
  url = "/archives/"
  weight = 20

[[menu.main]]
  identifier = "tags"
  name = "标签"
  url = "/tags/"
  weight = 30

[[menu.main]]
  identifier = "categories"
  name = "分类"
  url = "/categories/"
  weight = 40

[[menu.main]]
  identifier = "search"
  name = "搜索"
  url = "/search/"
  weight = 50

[markup]
  [markup.highlight]
    anchorLineNos = false
    codeFences = true
    guessSyntax = true
    lineNos = false
    noClasses = false
    style = "dracula"
  [markup.goldmark.renderer]
    unsafe = true
  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block  = [["$$", "$$"], ["\\[", "\\]"]]
      inline = [["$", "$"],   ["\\(", "\\)"]]

[outputs]
  home = ["HTML", "RSS", "JSON"]
