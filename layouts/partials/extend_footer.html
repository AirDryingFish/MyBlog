<script>
(function () {
  var isFine = window.matchMedia('(pointer: fine)').matches;

  /* ══════════════════════════════════════════
     0. Custom Cursor — DOM 光标跟随
     ══════════════════════════════════════════ */
  if (isFine) {
    var NORMAL = '#7b77ff', HOVER = '#00e5ff';
    var cc = document.getElementById('cc');
    if (!cc) {
      cc = document.createElement('div');
      cc.id = 'cc';
      cc.style.cssText = 'position:fixed;z-index:99999;pointer-events:none;will-change:transform;display:none';
      cc.innerHTML = '<svg width="20" height="22" viewBox="0 0 20 22" xmlns="http://www.w3.org/2000/svg"><path d="M3 1L3 17L7 13L10 20L13 18.5L10 11.5L16.5 11.5Z" fill="' + NORMAL + '" stroke="white" stroke-width="1.2" stroke-linejoin="round" paint-order="stroke"/></svg>';
      document.body.appendChild(cc);
    }
    var ccPath = cc.querySelector('path');
    var isHover = false;
    var sbHide = false;
    var mDown = false;

    document.addEventListener('mousemove', function (e) {
      if (sbHide) { sbHide = false; }
      cc.style.display = '';
      cc.style.left = e.clientX + 'px';
      cc.style.top = e.clientY + 'px';
      sessionStorage.setItem('_cp', JSON.stringify([e.clientX, e.clientY, isHover ? 1 : 0]));
    });

    document.addEventListener('mousedown', function () { mDown = true; });
    document.addEventListener('mouseup', function () { mDown = false; });
    document.addEventListener('scroll', function (e) {
      var t = e.target;
      if (mDown && !sbHide && t && t !== document && t.closest &&
          (t.closest('pre') || t.closest('.highlight'))) {
        sbHide = true;
        cc.style.display = 'none';
      }
    }, true);

    document.addEventListener('mouseover', function (e) {
      var t = e.target.closest('a,button,[role="button"],label,summary,select,.post-entry,input[type="submit"],input[type="button"],.tax-btn');
      if (t && !isHover) { isHover = true; ccPath.setAttribute('fill', HOVER); }
    });
    document.addEventListener('mouseout', function (e) {
      var t = e.target.closest('a,button,[role="button"],label,summary,select,.post-entry,input[type="submit"],input[type="button"],.tax-btn');
      if (t && isHover) { isHover = false; ccPath.setAttribute('fill', NORMAL); }
    });
    document.addEventListener('mouseleave', function () { cc.style.display = 'none'; });
    document.addEventListener('mouseenter', function () { if (!sbHide) cc.style.display = ''; });
  }

  /* ══════════════════════════════════════════
     1. Click Effects — 涟漪 + 粒子火花
     ══════════════════════════════════════════ */
  if (isFine) {
    document.addEventListener('mousedown', function (e) {
      var cx = e.clientX, cy = e.clientY;
      for (var i = 0; i < 2; i++) {
        (function (i) {
          setTimeout(function () {
            var ring = document.createElement('div');
            ring.className = 'click-ripple';
            ring.style.left = cx + 'px';
            ring.style.top  = cy + 'px';
            ring.style.setProperty('--scale', 2.5 + i * 1.5 + '');
            ring.style.setProperty('--dur', (400 + i * 140) + 'ms');
            document.body.appendChild(ring);
            ring.addEventListener('animationend', function () { ring.remove(); });
          }, i * 50);
        })(i);
      }
      for (var j = 0; j < 6; j++) {
        (function () {
          var angle = Math.random() * Math.PI * 2;
          var dist  = 30 + Math.random() * 40;
          var spark = document.createElement('div');
          spark.className = 'click-spark';
          spark.style.left = cx + 'px';
          spark.style.top  = cy + 'px';
          spark.style.background = ['var(--a1)', 'var(--a2)', 'var(--a3)'][Math.floor(Math.random() * 3)];
          spark.style.setProperty('--sx', Math.cos(angle) * dist + 'px');
          spark.style.setProperty('--sy', Math.sin(angle) * dist + 'px');
          spark.style.setProperty('--dur', (300 + Math.random() * 300) + 'ms');
          document.body.appendChild(spark);
          spark.addEventListener('animationend', function () { spark.remove(); });
        })();
      }
    });
  }

  /* ══════════════════════════════════════════
     2. Header Hide/Show — 滚动方向隐藏导航栏
     ══════════════════════════════════════════ */
  var header = document.querySelector('.header');
  if (header) {
    var lastY = window.scrollY;
    window.addEventListener('scroll', function () {
      requestAnimationFrame(function () {
        var y = window.scrollY;
        if (y > lastY && y > 60) {
          header.classList.add('nav-hidden');
        } else {
          header.classList.remove('nav-hidden');
        }
        lastY = y;
      });
    });
  }

  /* ══════════════════════════════════════════
     3. initPage — 每次内容变化后重新初始化
     ══════════════════════════════════════════ */
  function initPage() {
    /* Code Block Header — language label + copy button */
    var ICON_COPY = '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    var ICON_CHECK = '<svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';

    document.querySelectorAll('.highlight').forEach(function (wrap) {
      if (wrap.querySelector('.code-header')) return;

      /* 移除 PaperMod 原来的复制按钮 */
      var oldBtn = wrap.querySelector('.copy-code');
      if (oldBtn) oldBtn.remove();

      var code = wrap.querySelector('code[data-lang]');
      var lang = code ? code.getAttribute('data-lang') : '';
      if (lang === 'fallback') lang = '';

      var header = document.createElement('div');
      header.className = 'code-header';

      var label = document.createElement('span');
      label.className = 'code-lang';
      label.textContent = lang;
      header.appendChild(label);

      /* 新复制按钮 */
      var btn = document.createElement('button');
      btn.className = 'code-copy-btn';
      btn.setAttribute('aria-label', '复制代码');
      btn.innerHTML = ICON_COPY;
      btn.addEventListener('click', function () {
        var text = code ? code.innerText : '';
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(function () {
            btn.innerHTML = ICON_CHECK;
            btn.classList.add('copied');
            setTimeout(function () {
              btn.innerHTML = ICON_COPY;
              btn.classList.remove('copied');
            }, 2000);
          }).catch(function () { fallbackCopy(text, btn); });
        } else {
          fallbackCopy(text, btn);
        }
      });
      header.appendChild(btn);

      wrap.insertBefore(header, wrap.firstChild);
    });

    function fallbackCopy(text, btn) {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch (e) {}
      ta.remove();
      btn.innerHTML = ICON_CHECK;
      btn.classList.add('copied');
      setTimeout(function () {
        btn.innerHTML = ICON_COPY;
        btn.classList.remove('copied');
      }, 2000);
    }

    /* Scroll Reveal */
    var els = document.querySelectorAll('.post-entry:not(.revealed), .first-entry:not(.revealed)');
    if ('IntersectionObserver' in window && els.length) {
      var io = new IntersectionObserver(function (entries) {
        entries.forEach(function (e) {
          if (e.isIntersecting) {
            var d = Array.prototype.indexOf.call(els, e.target) * 60;
            setTimeout(function () { e.target.classList.add('revealed'); }, d);
            io.unobserve(e.target);
          }
        });
      }, { threshold: 0.08 });
      els.forEach(function (el) { io.observe(el); });
    } else {
      els.forEach(function (el) { el.classList.add('revealed'); });
    }

    /* Card Glow */
    if (isFine) {
      document.querySelectorAll('.post-entry:not([data-glow])').forEach(function (card) {
        card.setAttribute('data-glow', '1');
        var glow = document.createElement('div');
        glow.className = 'card-glow';
        card.appendChild(glow);
        card.addEventListener('mousemove', function (e) {
          var r = card.getBoundingClientRect();
          glow.style.background = 'radial-gradient(300px circle at ' + (e.clientX - r.left) + 'px ' + (e.clientY - r.top) + 'px, var(--card-glow), transparent 60%)';
        });
      });
    }

    /* View Toggle */
    var ctn = document.getElementById('posts-container');
    var tog = document.getElementById('view-toggle');
    if (ctn && tog && !tog.hasAttribute('data-init')) {
      tog.setAttribute('data-init', '1');
      var sv = localStorage.getItem('view-mode') || 'list';
      function setV(m) {
        ctn.classList.toggle('grid-view', m === 'grid');
        tog.querySelectorAll('.view-btn').forEach(function (b) {
          b.classList.toggle('active', b.getAttribute('data-view') === m);
        });
        localStorage.setItem('view-mode', m);
      }
      setV(sv);
      tog.addEventListener('click', function (e) {
        var btn = e.target.closest('.view-btn');
        if (btn) { e.stopPropagation(); setV(btn.getAttribute('data-view')); }
      });
    }

    /* Sidebar TOC */
    var ts = document.getElementById('toc-sidebar');
    if (ts) {
      var tl = ts.querySelectorAll('a[href^="#"]');
      if (tl.length) {
        var hm = [];
        tl.forEach(function (l) {
          var el = document.getElementById(decodeURIComponent(l.getAttribute('href').slice(1)));
          if (el) hm.push({ el: el, link: l });
        });
        function upToc() {
          var sy = window.scrollY, act = null;
          for (var i = 0; i < hm.length; i++) {
            if (hm[i].el.getBoundingClientRect().top + sy - 120 <= sy) act = hm[i];
          }
          tl.forEach(function (l) { l.classList.remove('toc-active'); });
          if (act) {
            act.link.classList.add('toc-active');
            var lt = act.link.offsetTop, sh = ts.clientHeight;
            if (lt < ts.scrollTop || lt > ts.scrollTop + sh - 40)
              ts.scrollTo({ top: lt - sh / 3, behavior: 'smooth' });
          }
        }
        window.addEventListener('scroll', function tocScroll() {
          requestAnimationFrame(upToc);
        });
        upToc();
      }
    }

    /* Execute inline scripts in <main> (for taxonomy pages etc.) */
    document.querySelectorAll('main.main script:not([src])').forEach(function (s) {
      if (s.getAttribute('data-exec')) return;
      s.setAttribute('data-exec', '1');
    });
  }

  initPage();

  /* ══════════════════════════════════════════
     4. SPA Navigation — 无刷新页面切换
     ══════════════════════════════════════════ */
  if (!window.fetch || !window.DOMParser || !window.history.pushState) return;

  var prefetchCache = {};

  document.addEventListener('mouseover', function (e) {
    var a = e.target.closest('a[href]');
    if (!a || a.origin !== location.origin || prefetchCache[a.href]) return;
    prefetchCache[a.href] = fetch(a.href).then(function (r) { return r.text(); });
  });

  document.addEventListener('click', function (e) {
    var a = e.target.closest('a[href]');
    if (!a || a.origin !== location.origin || a.target ||
        e.ctrlKey || e.metaKey || e.shiftKey || e.altKey ||
        a.hasAttribute('download')) return;
    if (a.pathname === location.pathname && a.hash) return;
    if (/\/search\/?$/.test(a.pathname)) return;
    if (/\/search\/?$/.test(location.pathname)) return;

    e.preventDefault();
    doNav(a.href, false);
  });

  window.addEventListener('popstate', function () {
    if (/\/search\/?$/.test(location.pathname)) {
      window.location.reload();
      return;
    }
    doNav(location.href, true);
  });

  function doNav(url, isPop) {
    var p = prefetchCache[url] || fetch(url).then(function (r) { return r.text(); });
    delete prefetchCache[url];

    p.then(function (html) {
      var doc = new DOMParser().parseFromString(html, 'text/html');

      document.title = doc.title;
      document.body.className = doc.body.className;
      document.body.id = doc.body.id || '';

      var nm = doc.querySelector('main.main');
      if (nm) document.querySelector('main.main').innerHTML = nm.innerHTML;

      var nMenu = doc.getElementById('menu');
      if (nMenu) document.getElementById('menu').innerHTML = nMenu.innerHTML;

      var oldToc = document.getElementById('toc-sidebar');
      var newToc = doc.getElementById('toc-sidebar');
      if (oldToc) oldToc.remove();
      if (newToc) {
        var main = document.querySelector('main.main');
        if (main) main.insertAdjacentElement('afterend', newToc);
      }

      if (!isPop) history.pushState({}, '', url);
      window.scrollTo(0, 0);
      if (header) header.classList.remove('nav-hidden');

      /* re-exec inline scripts in <main> */
      document.querySelectorAll('main.main script:not([src])').forEach(function (old) {
        var ns = document.createElement('script');
        ns.textContent = old.textContent;
        old.parentNode.replaceChild(ns, old);
      });

      initPage();
      prefetchCache = {};
    });
  }
})();
</script>
